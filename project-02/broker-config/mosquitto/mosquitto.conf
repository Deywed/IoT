# Mosquitto konfiguracija — Projekat 2
# Edge-orijentisan broker: mali otisak, perzistentne sesije za oporavak (Scenario B).

listener 1883
allow_anonymous true

# Perzistencija: trajne pretplate i neisporučene QoS 1/2 poruke preživljavaju restart
persistence true
persistence_location /mosquitto/data/

# Logovanje u stdout (vidljivo kroz `docker compose logs mosquitto`)
log_dest stdout
log_type all
connection_messages true

# Limiti reda čekanja — bitno za Scenario C (burst) i QoS 1/2 inflight prozor.
# 0 = bez limita na broj poruka u redu za offline/perzistentne klijente.
max_queued_messages 0
max_inflight_messages 200
