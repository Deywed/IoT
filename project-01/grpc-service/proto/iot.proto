syntax = "proto3";

option go_package = "./pb";
option csharp_namespace = "IotProject";

service SensorService {
    rpc SaveMeasurement   (MeasurementRequest)    returns (MeasurementResponse);
    rpc GetMeasurements   (GetMeasurementsRequest) returns (MeasurementsResponse);
    rpc GetSelectiveData  (SelectiveRequest)       returns (SelectiveResponse);
    rpc GetStats          (StatsRequest)           returns (StatsResponse);
}

// --- Write ---

message MeasurementRequest {
    string recorded_at      = 1;
    float  usage_overall    = 2;
    float  solar_generation = 3;
    float  fridge_kw        = 4;
    float  furnace_kw       = 5;
    float  home_office_kw   = 6;
    float  temperature      = 7;
    float  humidity         = 8;
    string summary          = 9;
}

message MeasurementResponse {
    bool   success = 1;
    string message = 2;
}

// --- GetMeasurements ---

message GetMeasurementsRequest {
    int32 limit = 1;
}

message MeasurementData {
    int64  id               = 1;
    string recorded_at      = 2;
    float  usage_overall    = 3;
    float  solar_generation = 4;
    float  fridge_kw        = 5;
    float  furnace_kw       = 6;
    float  home_office_kw   = 7;
    float  temperature      = 8;
    float  humidity         = 9;
    string summary          = 10;
}

message MeasurementsResponse {
    repeated MeasurementData measurements = 1;
}

// --- Scenario B: Selective ---

message SelectiveRequest {
    int32 limit = 1;
}

message SelectiveData {
    int64  id          = 1;
    string recorded_at = 2;
    float  temperature = 3;
    float  humidity    = 4;
}

message SelectiveResponse {
    repeated SelectiveData data = 1;
}

// --- Scenario C: agregacije ---

message StatsRequest {}

message StatsResponse {
    float avg_temperature = 1;
    float max_temperature = 2;
    float avg_usage       = 3;
    float max_usage       = 4;
    int64 total_readings  = 5;
}
